<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Five-Star Imports</title>
  </head>
  <body>

    <!-- LOADER -->
    <div id="loader">
      <video id="loader-video" autoplay muted playsinline preload="auto">
        <source src="/five-star-loader.mp4" type="video/mp4" />
      </video>
    </div>

    <style>
      #loader {
        position: fixed;
        inset: 0;
        background: #f8f5ef;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.6s ease;
      }

      #loader video {
        width: 200px;
        height: auto;
        opacity: 0;
        animation: fadeIn 0.8s ease forwards;
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
    </style>

    <!-- YOUR APP -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- LOADER SCRIPT -->
    <script>
      window.addEventListener("load", function () {
        const loader = document.getElementById("loader");
        const video = document.getElementById("loader-video");

        if (!loader || !video) return;

        // 🔥 Play video faster (2x speed)
        video.playbackRate = 2.0;

        let finished = false;

        // When video ends → remove loader
        video.addEventListener("ended", function () {
          finished = true;
          loader.style.opacity = "0";
          setTimeout(() => loader.remove(), 600);
        });

        // Fallback safety (in case event doesn't fire)
        setTimeout(() => {
          if (!finished) {
            loader.style.opacity = "0";
            setTimeout(() => loader.remove(), 600);
          }
        }, 5000);
      });
    </script>

  </body>
</html>
