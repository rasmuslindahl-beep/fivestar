<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Five-Star Imports</title>
  </head>
  <body>
    <div id="loader">
      <video autoplay muted playsinline>
        <source src="/Five-Star%20Imports%20Logo%20-%20Loader.mp4" type="video/mp4" />
      </video>
    </div>

    <style>
      #loader {
        position: fixed;
        inset: 0;
        background: #f8f5ef;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }

      #loader video {
        width: 200px;
        height: auto;
      }
    </style>

    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <script>
      window.addEventListener("load", function () {
        const loader = document.getElementById("loader");
        if (loader) {
          loader.style.opacity = "0";
          setTimeout(() => loader.remove(), 500);
        }
      });
    </script>
  </body>
</html>
